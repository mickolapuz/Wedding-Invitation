<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Kurt and Maica Wedding Invitation" />

    <meta property="og:title" content="Kurt and Maica Wedding Invitation" />
    <meta
      property="og:description"
      content="You are invited to celebrate our wedding."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://wedding-invitation-rho-nine.vercel.app/"
    />
    <meta
      property="og:image"
      content="https://wedding-invitation-rho-nine.vercel.app/assets/preview.png?v=2"
    />
    <meta
      property="og:image:secure_url"
      content="https://wedding-invitation-rho-nine.vercel.app/assets/preview.png?v=2"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:site_name" content="Kurt and Maica Wedding Invitation" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kurt and Maica Wedding Invitation" />
    <meta
      name="twitter:description"
      content="You are invited to celebrate our wedding."
    />
    <meta
      name="twitter:image"
      content="https://wedding-invitation-rho-nine.vercel.app/assets/preview.png?v=2"
    />

    <link rel="icon" href="/assets/preview.png" />

    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>
    <section class="intro" id="intro">
      <div class="intro-content">
        <p>Together with our families, we</p>
        <img src="./assets/Names.png" alt="Kurt & Maica" />
        <p>
          invite you to share with us this joyous celebration of love and
          marriage on
        </p>
        <button id="openBtn">BE OUR GUEST</button>
      </div>
    </section>

    <main class="invitation" id="invitation">
      <section class="sheet">
        <img src="./assets/Sheet1.png" />
      </section>
      <section class="sheet">
        <img src="./assets/Sheet4.png" />
      </section>
      <section class="sheet">
        <img src="./assets/Sheet5.png" />
      </section>
      <section class="sheet">
        <img src="./assets/Sheet3.png" />
      </section>
      <section class="sheet">
        <img src="./assets/Sheet2.png" />
      </section>
    </main>

    <script>
      const btn = document.getElementById("openBtn");
      const intro = document.getElementById("intro");
      const invitation = document.getElementById("invitation");

      btn.addEventListener("click", () => {
        intro.classList.add("hide");
        invitation.classList.add("show");
      });
    </script>
  </body>
</html>
